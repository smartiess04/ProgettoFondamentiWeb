services:
  mongo: 
    image: mongo:latest
    container_name: liber-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: liber-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./backend/assets:/app/assets
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build: ./frontend/liber-react
    container_name: liber-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:




